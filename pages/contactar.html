<section id="cta">
  <div class="cta-content">
    <h2>¿Cuánto estás gastando de más en combustible?</h2>
    <p>Solicita un diagnóstico energético inicial sin costo. Te enviaremos un análisis preliminar en 48 horas.</p>
    <form class="cta-form" id="contactForm">
      <input class="cta-input" type="text" id="nombre" placeholder="Tu nombre" required />
      <input class="cta-input" type="email" id="email" placeholder="tu@empresa.com" required />
      <input class="cta-input" type="text" id="empresa" placeholder="Nombre de tu empresa" required />
      <input class="cta-input" type="tel" id="telefono" placeholder="Teléfono de contacto" required />
      <button type="submit" class="cta-btn" id="submitBtn">Solicitar diagnóstico gratuito</button>
    </form>
    <div id="ctaMessage" class="cta-message"></div>
    <p class="cta-trust">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Sin compromiso. Información confidencial.
    </p>
  </div>
</section>
